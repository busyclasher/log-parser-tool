# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  logparser-net:
    driver: bridge
    name: logparser-net

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  timescale-data:
  dynamodb-data:
  redis-data:
  minio-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
